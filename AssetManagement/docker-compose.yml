services:
  db:
    image: postgres:16-alpine
    container_name: ams-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: asset_management
      POSTGRES_USER: ams_admin
      POSTGRES_PASSWORD: ams_secret_2024
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ams_admin -d asset_management"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ams-backend
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ams_admin
      DB_PASSWORD: ams_secret_2024
      DB_NAME: asset_management
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/__pycache__
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: ams-frontend
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
