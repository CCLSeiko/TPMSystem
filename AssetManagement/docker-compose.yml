services:
  db:
    image: postgres:16-alpine
    container_name: ams-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: asset_management
      POSTGRES_USER: ams_admin
      POSTGRES_PASSWORD: ams_secret_2024
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ams_admin -d asset_management"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ams-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://ams_admin:ams_secret_2024@db:5432/asset_management
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/__pycache__

  frontend:
    build: ./frontend
    container_name: ams-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  pgdata:
